# Monitor Agent — Reddit RSS + YouTube API signal collector
# No API keys, no Claude access. Processes untrusted content.

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  reddit:
    name: reddit-rss
    endpoints:
      - { host: www.reddit.com, port: 443 }
      - { host: old.reddit.com, port: 443 }
    binaries:
      - { path: "/sandbox/.uv/python/**" }
      - { path: /sandbox/.venv/bin/python3 }
      - { path: /usr/bin/curl }

  youtube:
    name: youtube-api
    endpoints:
      - { host: www.googleapis.com, port: 443 }
    binaries:
      - { path: "/sandbox/.uv/python/**" }
      - { path: /sandbox/.venv/bin/python3 }
      - { path: /usr/bin/curl }

  pypi:
    name: python-packages
    endpoints:
      - { host: pypi.org, port: 443 }
      - { host: files.pythonhosted.org, port: 443 }
    binaries:
      - { path: "/sandbox/.uv/python/**" }
      - { path: /sandbox/.venv/bin/pip }
